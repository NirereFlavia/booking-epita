spring:
  application:
    name: BookingCreelHouse

  datasource:
    url: jdbc:h2:file:./booking.db
    driverClassName: org.h2.Driver
    username: sa
    password: sa

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update

  ssl:
    bundle:
      pem:
        web:
          keystore:
            private-key: "file:tls/localhost-key-pkcs8.pem"
            certificate: "file:tls/localhost-cert.pem"
          truststore:
            certificate: "file:/Users/flavianirere/Library/Application Support/mkcert/rootCA.pem"
  # Step 1a: Configure SSL with the certificate and private key
  # ...
  # Step 1a: End of SSL configuration

server:
  port: 8443
  ssl:
    enabled: true
    bundle: web
  # Step 1b: Enable SSL and specify ssl bundle
  # ...
  # Step 1b: End of SSL configuration
  # Step 5: Configure session cookie with SameSite attribute
  # ...
  servlet:
    session:
      cookie:
        same-site: strict
  # Step 5: End of session cookie configuration